#云编译公用核心
name: WRT-CORE-LIBWRT

# 定义触发条件
on:
  # 允许通过GitHub UI手动触发
  workflow_dispatch: 

jobs:
  LIBWRT:
    config:
      name: ${{matrix.TARGET}}
      strategy:
        fail-fast: false
        #max-parallel: 3
        matrix:
          TARGET: [IPQ60XX-WIFI-NO]
          SOURCE: [VIKINGYFY/immortalwrt]
    uses: ./.github/workflows/WRT-CORE.yml
    with:
      #编译平台
      WRT_TARGET: IPQ60XX-WIFI-NO
      #编译空间
      WRT_WORKSPACE: LIBWRT
      #默认主题
      WRT_THEME: argon
      #默认主机名
      WRT_NAME: LibWRT
      #默认WIFI名
      WRT_WIFI: LibWRT
      #默认地址
      WRT_IP: 192.168.1.1
      #默认密码，仅作提示，修改无用
      WRT_PW: 无
      #源码链接
      WRT_REPO: https://github.com/${{matrix.SOURCE}}.git
      #源码分支
      WRT_BRANCH: main
      #源码名称
      WRT_SOURCE: ${{matrix.SOURCE}}
      #插件调整
      WRT_PACKAGE: ${{inputs.PACKAGE}}
      #仅输出配置文件
      WRT_TEST: ${{inputs.TEST}}